<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 RPNCE Study Guide: Multiple Choice Examination</title>

<style>
body {
  font-family: Calibri, Arial, sans-serif;
  background-color: #ffffff;
  color: #444444;
}

.quiz-box {
  max-width: 520px;
  margin: 25px auto;
  padding: 20px;
  border: 2px solid #8ecaff;
  border-radius: 8px;
  background: #ffffff;
}

.quiz-question {
  font-size: 20px;
  margin-bottom: 15px;
  font-weight: 600;
  color: #444444;
}

.quiz-option {
  color: #003366;
  font-size: 18px;
  margin: 8px 0;
  padding: 10px;
  border: 1px solid #003366;
  border-radius: 4px;
  cursor: pointer;
}

.quiz-option:hover {
  background-color: #f0f8ff;
}

.correct { border: 2px solid green; }
.incorrect { border: 2px solid #6B1A19; }

.quiz-feedback {
  margin-top: 15px;
  display: none;
  font-size: 16px;
  white-space: pre-line;
}

.feedback-correct { color: green; }
.feedback-incorrect { color: #6B1A19; }
</style>
</head>

<body>

<h2 style="text-align:center; font-weight:600;">
2026 RPNCE Study Guide: Multiple Choice Examination
</h2>

<div class="quiz-box">
  <div class="quiz-question">
    Question 1: If back pain, chills, or fever occur during transfusion, what is the FIRST action?
  </div>

  <div class="quiz-option" onclick="selectAnswer(this, true)">
    Stop the transfusion and maintain IV with normal saline
  </div>

  <div class="quiz-option" onclick="selectAnswer(this, false)">
    Slow the infusion
  </div>

  <div class="quiz-option" onclick="selectAnswer(this, false)">
    Continue monitoring
  </div>

  <div class="quiz-option" onclick="selectAnswer(this, false)">
    Administer antihistamine only
  </div>

  <div class="quiz-feedback"></div>
</div>

<script>
function selectAnswer(element, isCorrect) {
  const box = element.parentElement;
  const options = box.querySelectorAll(".quiz-option");
  const feedback = box.querySelector(".quiz-feedback");

  options.forEach(opt => {
    opt.classList.remove("correct", "incorrect");
    opt.onclick = null;  // lock answers after selection
  });

  if (isCorrect) {
    element.classList.add("correct");
    feedback.className = "quiz-feedback feedback-correct";
    feedback.innerText =
      "CORRECT: The transfusion must be stopped immediately to prevent worsening hemolytic or septic reaction. Maintaining IV access with normal saline preserves venous access for emergency medications.";
  } else {
    element.classList.add("incorrect");
    feedback.className = "quiz-feedback feedback-incorrect";
    feedback.innerText =
      "INCORRECT: Continuing the transfusion or delaying intervention allows antigen exposure to continue and increases risk of severe hemolysis or anaphylaxis. The FIRST action is to stop the transfusion.";
  }

  feedback.style.display = "block";
}
</script>

</body>
</html>
